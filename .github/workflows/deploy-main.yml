name: Deploy On Main Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate Cloudflare Secrets
        run: |
          test -n "${CLOUDFLARE_ACCOUNT_ID}" || (echo "::error::Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "${CLOUDFLARE_API_TOKEN}" || (echo "::error::Missing GitHub secret: CLOUDFLARE_API_TOKEN" && exit 1)

      - name: Deploy To Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name "${CLOUDFLARE_PROJECT_NAME:-atriveo-app}" --branch main
